<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TeamDesk Viewer</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --panel-border: #dbe3ef;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --neutral-bg: #eef2f7;
            --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 28px;
        }

        .page-subtitle {
            color: var(--muted);
            margin-top: 6px;
            font-size: 14px;
        }

        .topbar {
            display: flex;
            gap: 12px;
            align-items: end;
            flex-wrap: wrap;
            padding: 16px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 13px;
            color: var(--muted);
        }

        .field input {
            min-width: 240px;
            padding: 11px 12px;
            border: 1px solid #cfd8e3;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        .field input:focus {
            border-color: var(--primary);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--neutral-bg);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #dfe7f2;
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 18px;
            border-bottom: 1px solid #e8edf5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 18px;
        }

        .panel-body {
            padding: 16px;
        }

        .machines-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .machine-card {
            border: 1px solid #e6edf6;
            background: #fbfdff;
            border-radius: 14px;
            padding: 14px;
        }

        .machine-card.online {
            border-left: 4px solid #22c55e;
        }

        .machine-card.offline {
            border-left: 4px solid #94a3b8;
        }

        .machine-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: start;
            margin-bottom: 10px;
        }

        .machine-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .machine-id {
            font-size: 12px;
            color: var(--muted);
            word-break: break-word;
        }

        .machine-meta {
            font-size: 13px;
            color: #475569;
            margin-top: 4px;
        }

        .machine-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .badge.online {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .badge.offline {
            background: #eef2f7;
            color: #475569;
        }

        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(620px, 1fr));
            gap: 16px;
        }

        .session-card {
            background: #fff;
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .session-card.active {
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.28), var(--shadow);
        }

        .session-card.expanded {
            grid-column: 1 / -1;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #e8edf5;
            background: #fcfdff;
        }

        .session-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .session-subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
            word-break: break-word;
        }

        .session-status {
            margin-top: 8px;
            display: inline-block;
            font-size: 12px;
            color: #334155;
            background: #eef2f7;
            border-radius: 999px;
            padding: 5px 10px;
        }

        .session-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            background: #eef2f7;
            color: #334155;
            font-size: 18px;
            line-height: 1;
            padding: 0;
        }

        .icon-btn:hover {
            background: #dbe5f2;
        }

        .icon-btn.danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .icon-btn.danger:hover {
            background: #fecaca;
        }

        .session-video-wrap {
            padding: 14px;
        }

        .remote-video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 14px;
            display: block;
            border: 2px solid transparent;
            outline: none;
            cursor: none;
        }

        .remote-video.active {
            border-color: var(--primary);
        }

        .session-card.expanded .remote-video {
            aspect-ratio: 16 / 8;
            max-height: 78vh;
        }

        .empty-state {
            color: var(--muted);
            font-size: 14px;
            padding: 8px 0;
        }

        .hint {
            color: var(--muted);
            font-size: 13px;
        }

        .message {
            margin-top: 12px;
            font-size: 13px;
            color: #334155;
            min-height: 18px;
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sessions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="page-header">
        <div>
            <h1>TeamDesk Viewer</h1>
            <div class="page-subtitle">
                Просматривай доступные агенты, добавляй по ID и открывай несколько удалённых экранов
            </div>
        </div>
    </div>

    <div class="topbar">
        <div class="field">
            <label for="viewerId">Viewer ID</label>
            <input id="viewerId" value="viewer-1">
        </div>

        <div class="field">
            <label for="machineIdInput">Добавить агента по ID</label>
            <input id="machineIdInput" placeholder="Например: desktop-agent-1">
        </div>

        <div class="actions">
            <button id="connectSignalingBtn" class="btn-primary">Подключить signaling</button>
            <button id="refreshMachinesBtn" class="btn-secondary">Обновить список агентов</button>
            <button id="addMachineBtn" class="btn-secondary">Добавить по ID</button>
        </div>
    </div>

    <div id="pageMessage" class="message"></div>

    <div class="layout">
        <div class="panel">
            <div class="panel-header">
                <h2>Агенты</h2>
                <span class="hint">Подключайся к online-машинам и удаляй неактуальные записи</span>
            </div>
            <div class="panel-body">
                <div id="machinesList" class="machines-list"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h2>Активные трансляции</h2>
                <span class="hint">Кликни по экрану, чтобы сделать его активным для управления</span>
            </div>
            <div class="panel-body">
                <div id="sessionsGrid" class="sessions-grid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const machinesListEl = document.getElementById("machinesList");
    const sessionsGridEl = document.getElementById("sessionsGrid");
    const pageMessageEl = document.getElementById("pageMessage");

    let ws = null;
    let signalingConnected = false;
    let activeSessionKey = null;

    const sessions = new Map();
    let machinesCache = [];

    function setPageMessage(text, isError = false) {
        pageMessageEl.textContent = text || "";
        pageMessageEl.style.color = isError ? "#b91c1c" : "#334155";
    }

    function getViewerId() {
        return document.getElementById("viewerId").value.trim();
    }

    function getMachineIdInput() {
        return document.getElementById("machineIdInput").value.trim();
    }

    function formatDate(value) {
        if (!value) return "—";
        try {
            return new Date(value).toLocaleString();
        } catch {
            return value;
        }
    }

    function isSessionStarted(session) {
        return !!session.sessionId;
    }

    function setActiveSession(machineId) {
        activeSessionKey = machineId;

        for (const [key, session] of sessions.entries()) {
            if (!session.videoEl || !session.cardEl) continue;

            if (key === machineId) {
                session.videoEl.classList.add("active");
                session.cardEl.classList.add("active");
            } else {
                session.videoEl.classList.remove("active");
                session.cardEl.classList.remove("active");
            }
        }
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function cssSafe(value) {
        return String(value).replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function cssEscapeId(id) {
        return id.replace(/([:.])/g, "\\$1");
    }

    function setSessionStatus(session, text) {
        session.statusText = text;
        if (session.statusEl) {
            session.statusEl.textContent = text;
        }
    }

    function connectSignaling() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            return;
        }

        const viewerId = getViewerId();
        if (!viewerId) {
            setPageMessage("Viewer ID обязателен", true);
            return;
        }

        ws = new WebSocket("ws://localhost:8080/ws/signaling");

        ws.onopen = () => {
            signalingConnected = true;

            ws.send(JSON.stringify({
                type: "REGISTER_VIEWER",
                viewerId
            }));

            const btn = document.getElementById("connectSignalingBtn");
            btn.textContent = "Signaling подключён";
            btn.disabled = true;

            setPageMessage("Signaling подключён");
        };

        ws.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            await routeWsMessage(msg);
        };

        ws.onerror = () => {
            setPageMessage("Ошибка WebSocket signaling", true);
        };

        ws.onclose = () => {
            signalingConnected = false;
            const btn = document.getElementById("connectSignalingBtn");
            btn.textContent = "Подключить signaling";
            btn.disabled = false;
            setPageMessage("Signaling отключён", true);
        };
    }

    async function routeWsMessage(msg) {
        const machineId = msg.machineId;
        const session = machineId ? sessions.get(machineId) : null;

        if (msg.type === "CONSENT_GRANTED") {
            if (!session) return;

            session.consentPending = false;
            session.consentGranted = true;
            setSessionStatus(session, "Доступ разрешён");

            await startSessionAfterConsent(session);
            return;
        }

        if (msg.type === "CONSENT_DECLINED") {
            if (!session) return;

            session.consentPending = false;
            session.consentGranted = false;
            setSessionStatus(session, "Доступ отклонён");
            return;
        }

        if (msg.type === "STOP_SESSION") {
            if (!session) return;

            cleanupLocalSession(session, false);
            return;
        }

        if (msg.type === "SDP_ANSWER") {
            if (!session || !session.pc) return;

            await session.pc.setRemoteDescription({
                type: "answer",
                sdp: msg.sdp
            });

            setSessionStatus(session, "Подключено");
            return;
        }

        if (msg.type === "ICE_CANDIDATE") {
            if (!session || !session.pc) return;

            await session.pc.addIceCandidate({
                candidate: msg.candidate,
                sdpMid: msg.sdpMid,
                sdpMLineIndex: msg.sdpMLineIndex
            });
        }
    }

    async function loadMachines() {
        try {
            const res = await fetch("/api/machines");
            if (!res.ok) {
                throw new Error("Не удалось загрузить список машин");
            }

            machinesCache = await res.json();
            renderMachines(machinesCache);
            setPageMessage(`Загружено агентов: ${machinesCache.length}`);
        } catch (e) {
            setPageMessage("Ошибка загрузки списка агентов", true);
            console.error(e);
        }
    }

    function renderMachines(machines) {
        const sorted = [...machines].sort((a, b) => {
            if (a.status === b.status) {
                return (a.hostname || a.machineId).localeCompare(b.hostname || b.machineId);
            }
            return a.status === "ONLINE" ? -1 : 1;
        });

        if (!sorted.length) {
            machinesListEl.innerHTML = `<div class="empty-state">Нет доступных агентов</div>`;
            return;
        }

        machinesListEl.innerHTML = "";

        for (const machine of sorted) {
            const div = document.createElement("div");
            div.className = `machine-card ${machine.status === "ONLINE" ? "online" : "offline"}`;

            const alreadyOpen = sessions.has(machine.machineId);

            div.innerHTML = `
                <div class="machine-top">
                    <div>
                        <div class="machine-name">${escapeHtml(machine.hostname || machine.machineId)}</div>
                        <div class="machine-id">ID: ${escapeHtml(machine.machineId)}</div>
                    </div>
                    <span class="badge ${machine.status === "ONLINE" ? "online" : "offline"}">
                        ${escapeHtml(machine.status)}
                    </span>
                </div>

                <div class="machine-meta">OS: ${escapeHtml(machine.osName || "—")}</div>
                <div class="machine-meta">Версия агента: ${escapeHtml(machine.agentVersion || "—")}</div>
                <div class="machine-meta">IP: ${escapeHtml(machine.lastKnownIp || "—")}</div>
                <div class="machine-meta">Последний heartbeat: ${escapeHtml(formatDate(machine.lastHeartbeatAt))}</div>

                <div class="machine-actions">
                    <button class="btn-primary connect-btn" ${machine.status !== "ONLINE" || alreadyOpen ? "disabled" : ""}>
                        ${alreadyOpen ? "Открыто" : "Подключиться"}
                    </button>
                    <button class="btn-danger delete-btn">Удалить</button>
                </div>
            `;

            const connectBtn = div.querySelector(".connect-btn");
            const deleteBtn = div.querySelector(".delete-btn");

            if (machine.status === "ONLINE" && !alreadyOpen) {
                connectBtn.onclick = () => openMachineSession(machine);
            }

            deleteBtn.onclick = () => deleteMachine(machine);

            machinesListEl.appendChild(div);
        }
    }

    async function addMachineById() {
        const machineId = getMachineIdInput();
        if (!machineId) {
            setPageMessage("Введи ID агента", true);
            return;
        }

        const existing = machinesCache.find(x => x.machineId === machineId);
        if (existing) {
            setPageMessage(`Агент ${machineId} уже есть в списке`);
            return;
        }

        try {
            const res = await fetch("/api/machines");
            if (!res.ok) {
                throw new Error("Не удалось загрузить список машин");
            }

            const allMachines = await res.json();
            const found = allMachines.find(x => x.machineId === machineId);

            if (!found) {
                setPageMessage(`Агент с ID ${machineId} не найден`, true);
                return;
            }

            machinesCache.push(found);
            renderMachines(machinesCache);
            document.getElementById("machineIdInput").value = "";
            setPageMessage(`Агент ${machineId} добавлен в список`);
        } catch (e) {
            setPageMessage("Ошибка при добавлении агента", true);
            console.error(e);
        }
    }

    async function deleteMachine(machine) {
        const confirmed = confirm(`Удалить агента "${machine.hostname || machine.machineId}"?`);
        if (!confirmed) return;

        try {
            const res = await fetch(`/api/machines/${encodeURIComponent(machine.machineId)}`, {
                method: "DELETE"
            });

            if (!res.ok && res.status !== 204) {
                const text = await res.text();
                throw new Error(text || `HTTP ${res.status}`);
            }

            if (sessions.has(machine.machineId)) {
                stopMachineSession(machine.machineId);
            }

            machinesCache = machinesCache.filter(x => x.machineId !== machine.machineId);
            renderMachines(machinesCache);
            setPageMessage(`Агент ${machine.machineId} удалён`);
        } catch (e) {
            setPageMessage("Не удалось удалить агента", true);
            console.error(e);
        }
    }

    function openMachineSession(machine) {
        if (sessions.has(machine.machineId)) {
            return;
        }

        const session = createSessionState(machine);
        sessions.set(machine.machineId, session);

        renderSessionCard(session);
        renderMachines(machinesCache);
        setSessionStatus(session, "Готово к подключению");
    }

    function createSessionState(machine) {
        return {
            machineId: machine.machineId,
            hostname: machine.hostname || machine.machineId,
            osName: machine.osName || "",
            viewerId: getViewerId(),
            sessionId: null,
            pc: null,
            dataChannel: null,
            consentPending: false,
            consentGranted: false,
            startInProgress: false,
            cardEl: null,
            videoEl: null,
            statusEl: null,
            statusText: "Idle",
            expanded: false
        };
    }

    function renderSessionCard(session) {
        const card = document.createElement("div");
        card.className = "session-card";

        const videoId = `video-${cssSafe(session.machineId)}`;
        const statusId = `status-${cssSafe(session.machineId)}`;
        const connectBtnId = `connect-${cssSafe(session.machineId)}`;
        const stopBtnId = `stop-${cssSafe(session.machineId)}`;
        const expandBtnId = `expand-${cssSafe(session.machineId)}`;
        const closeBtnId = `close-${cssSafe(session.machineId)}`;

        card.innerHTML = `
            <div class="session-header">
                <div>
                    <div class="session-title">${escapeHtml(session.hostname)}</div>
                    <div class="session-subtitle">ID: ${escapeHtml(session.machineId)}</div>
                    <div class="session-subtitle">OS: ${escapeHtml(session.osName || "—")}</div>
                    <div id="${statusId}" class="session-status">${escapeHtml(session.statusText)}</div>
                </div>
                <div class="session-actions">
                    <button id="${connectBtnId}" class="btn-primary">Connect</button>
                    <button id="${stopBtnId}" class="btn-secondary">Stop</button>
                    <button id="${expandBtnId}" class="icon-btn" title="Развернуть">⛶</button>
                    <button id="${closeBtnId}" class="icon-btn danger" title="Закрыть карточку">×</button>
                </div>
            </div>

            <div class="session-video-wrap">
                <video
                    id="${videoId}"
                    class="remote-video"
                    autoplay
                    playsinline
                    muted
                    tabindex="1"
                ></video>
            </div>
        `;

        sessionsGridEl.appendChild(card);

        session.cardEl = card;
        session.videoEl = card.querySelector(`#${cssEscapeId(videoId)}`);
        session.statusEl = card.querySelector(`#${cssEscapeId(statusId)}`);

        const connectBtn = card.querySelector(`#${cssEscapeId(connectBtnId)}`);
        const stopBtn = card.querySelector(`#${cssEscapeId(stopBtnId)}`);
        const expandBtn = card.querySelector(`#${cssEscapeId(expandBtnId)}`);
        const closeBtn = card.querySelector(`#${cssEscapeId(closeBtnId)}`);

        connectBtn.onclick = () => requestConsent(session);
        stopBtn.onclick = () => stopMachineSession(session.machineId);
        expandBtn.onclick = () => toggleExpandSession(session.machineId);
        closeBtn.onclick = () => closeSessionCard(session.machineId);

        attachRemoteControls(session);

        session.videoEl.addEventListener("mousedown", () => {
            setActiveSession(session.machineId);
        });

        session.videoEl.addEventListener("click", () => {
            setActiveSession(session.machineId);
        });
    }

    function toggleExpandSession(machineId) {
        const session = sessions.get(machineId);
        if (!session || !session.cardEl) return;

        session.expanded = !session.expanded;
        session.cardEl.classList.toggle("expanded", session.expanded);
    }

    function closeSessionCard(machineId) {
        const session = sessions.get(machineId);
        if (!session) return;

        if (session.sessionId) {
            stopMachineSession(machineId);
            return;
        }

        if (session.cardEl) {
            session.cardEl.remove();
        }

        sessions.delete(machineId);
        if (activeSessionKey === machineId) {
            activeSessionKey = null;
        }
        renderMachines(machinesCache);
    }

    function requestConsent(session) {
        if (!signalingConnected || !ws || ws.readyState !== WebSocket.OPEN) {
            setPageMessage("Сначала подключи signaling", true);
            return;
        }

        if (session.consentPending || session.startInProgress || isSessionStarted(session)) {
            return;
        }

        session.viewerId = getViewerId();
        if (!session.viewerId) {
            setPageMessage("Viewer ID обязателен", true);
            return;
        }

        session.consentPending = true;
        session.consentGranted = false;
        setSessionStatus(session, "Ожидание подтверждения");

        ws.send(JSON.stringify({
            type: "REQUEST_CONSENT",
            machineId: session.machineId,
            viewerId: session.viewerId
        }));
    }

    async function startSessionAfterConsent(session) {
        if (!session.consentGranted || session.startInProgress) {
            return;
        }

        session.startInProgress = true;
        setSessionStatus(session, "Создание сессии");

        try {
            const res = await fetch("/api/remote-sessions/start", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    machineId: session.machineId,
                    viewerId: session.viewerId
                })
            });

            if (!res.ok) {
                const text = await res.text();
                throw new Error(text || `HTTP ${res.status}`);
            }

            const startResponse = await res.json();
            session.sessionId = startResponse.sessionId;

            await createPeer(session);

            const offer = await session.pc.createOffer({
                offerToReceiveVideo: true,
                offerToReceiveAudio: false
            });

            await session.pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: "SDP_OFFER",
                sessionId: session.sessionId,
                machineId: session.machineId,
                viewerId: session.viewerId,
                sdp: offer.sdp
            }));

            setSessionStatus(session, "Идёт подключение");
        } catch (e) {
            console.error(e);
            setSessionStatus(session, "Ошибка запуска");
            setPageMessage(`Не удалось запустить сессию для ${session.hostname}`, true);
        } finally {
            session.startInProgress = false;
        }
    }

    async function createPeer(session) {
        if (session.pc) {
            return;
        }

        session.pc = new RTCPeerConnection({
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" }
            ]
        });

        session.pc.ontrack = (event) => {
            session.videoEl.srcObject = event.streams[0];
            setSessionStatus(session, "Трансляция активна");
        };

        session.pc.onconnectionstatechange = () => {
            if (!session.pc) return;
            if (session.pc.connectionState === "connected") {
                setSessionStatus(session, "Подключено");
            } else if (session.pc.connectionState === "disconnected") {
                setSessionStatus(session, "Соединение потеряно");
            } else if (session.pc.connectionState === "failed") {
                setSessionStatus(session, "Ошибка соединения");
            }
        };

        session.pc.onicecandidate = (event) => {
            if (!event.candidate) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (!session.sessionId) return;

            ws.send(JSON.stringify({
                type: "ICE_CANDIDATE",
                sessionId: session.sessionId,
                machineId: session.machineId,
                viewerId: session.viewerId,
                candidate: event.candidate.candidate,
                sdpMid: event.candidate.sdpMid,
                sdpMLineIndex: event.candidate.sdpMLineIndex
            }));
        };

        session.dataChannel = session.pc.createDataChannel("control");
    }

    function sendInputEvent(session, payload) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        if (!session.sessionId) return;

        ws.send(JSON.stringify({
            type: "INPUT_EVENT",
            sessionId: session.sessionId,
            machineId: session.machineId,
            viewerId: session.viewerId,
            payload: JSON.stringify(payload)
        }));
    }

    function mapMouseButton(button) {
        switch (button) {
            case 0: return 1;
            case 1: return 2;
            case 2: return 3;
            default: return 1;
        }
    }

    function getNormalizedCoordinates(video, event) {
        const rect = video.getBoundingClientRect();

        let x = (event.clientX - rect.left) / rect.width;
        let y = (event.clientY - rect.top) / rect.height;

        x = Math.max(0, Math.min(1, x));
        y = Math.max(0, Math.min(1, y));

        return { x, y };
    }

    function attachRemoteControls(session) {
        session.videoEl.addEventListener("mousemove", (e) => {
            if (activeSessionKey !== session.machineId) return;

            const { x, y } = getNormalizedCoordinates(session.videoEl, e);
            sendInputEvent(session, {
                eventType: "mouse_move",
                x,
                y
            });
        });

        session.videoEl.addEventListener("mousedown", (e) => {
            setActiveSession(session.machineId);
            e.preventDefault();
            session.videoEl.focus();

            const { x, y } = getNormalizedCoordinates(session.videoEl, e);
            sendInputEvent(session, {
                eventType: "mouse_down",
                x,
                y,
                button: mapMouseButton(e.button)
            });
        });

        session.videoEl.addEventListener("mouseup", (e) => {
            if (activeSessionKey !== session.machineId) return;
            e.preventDefault();

            const { x, y } = getNormalizedCoordinates(session.videoEl, e);
            sendInputEvent(session, {
                eventType: "mouse_up",
                x,
                y,
                button: mapMouseButton(e.button)
            });
        });

        session.videoEl.addEventListener("click", (e) => {
            setActiveSession(session.machineId);
            e.preventDefault();

            const { x, y } = getNormalizedCoordinates(session.videoEl, e);
            sendInputEvent(session, {
                eventType: "mouse_click",
                x,
                y,
                button: mapMouseButton(e.button)
            });
        });

        session.videoEl.addEventListener("dblclick", (e) => {
            setActiveSession(session.machineId);
            e.preventDefault();

            const { x, y } = getNormalizedCoordinates(session.videoEl, e);
            sendInputEvent(session, {
                eventType: "mouse_double_click",
                x,
                y,
                button: mapMouseButton(e.button)
            });
        });

        session.videoEl.addEventListener("contextmenu", (e) => {
            setActiveSession(session.machineId);
            e.preventDefault();

            const { x, y } = getNormalizedCoordinates(session.videoEl, e);
            sendInputEvent(session, {
                eventType: "mouse_click",
                x,
                y,
                button: 3
            });
        });

        session.videoEl.addEventListener("wheel", (e) => {
            if (activeSessionKey !== session.machineId) return;
            e.preventDefault();

            sendInputEvent(session, {
                eventType: "mouse_wheel",
                wheelDelta: e.deltaY > 0 ? 1 : -1
            });
        }, { passive: false });

        window.addEventListener("keydown", (e) => {
            if (activeSessionKey !== session.machineId) return;
            if (document.activeElement !== session.videoEl) return;

            e.preventDefault();
            sendInputEvent(session, {
                eventType: "key_down",
                key: e.key,
                code: e.code
            });
        });

        window.addEventListener("keyup", (e) => {
            if (activeSessionKey !== session.machineId) return;
            if (document.activeElement !== session.videoEl) return;

            e.preventDefault();
            sendInputEvent(session, {
                eventType: "key_up",
                key: e.key,
                code: e.code
            });
        });
    }

    function stopMachineSession(machineId) {
        const session = sessions.get(machineId);
        if (!session) return;

        if (ws && ws.readyState === WebSocket.OPEN && session.sessionId) {
            ws.send(JSON.stringify({
                type: "STOP_SESSION",
                sessionId: session.sessionId,
                machineId: session.machineId,
                viewerId: session.viewerId
            }));
        }

        cleanupLocalSession(session, true);
    }

    function cleanupLocalSession(session, removeCard) {
        session.consentPending = false;
        session.consentGranted = false;
        session.startInProgress = false;
        session.sessionId = null;

        if (session.dataChannel) {
            try {
                session.dataChannel.close();
            } catch (e) {
                console.error(e);
            }
            session.dataChannel = null;
        }

        if (session.pc) {
            try {
                session.pc.close();
            } catch (e) {
                console.error(e);
            }
            session.pc = null;
        }

        if (session.videoEl) {
            session.videoEl.srcObject = null;
            session.videoEl.classList.remove("active");
        }

        setSessionStatus(session, "Остановлено");

        if (activeSessionKey === session.machineId) {
            activeSessionKey = null;
        }

        if (removeCard) {
            if (session.cardEl) {
                session.cardEl.remove();
            }
            sessions.delete(session.machineId);
            renderMachines(machinesCache);
        }
    }

    document.getElementById("connectSignalingBtn").onclick = connectSignaling;
    document.getElementById("refreshMachinesBtn").onclick = loadMachines;
    document.getElementById("addMachineBtn").onclick = addMachineById;

    window.addEventListener("beforeunload", () => {
        try {
            if (ws && ws.readyState === WebSocket.OPEN) {
                for (const session of sessions.values()) {
                    if (session.sessionId) {
                        ws.send(JSON.stringify({
                            type: "STOP_SESSION",
                            sessionId: session.sessionId,
                            machineId: session.machineId,
                            viewerId: session.viewerId
                        }));
                    }
                }
            }

            for (const session of sessions.values()) {
                if (session.dataChannel) {
                    session.dataChannel.close();
                }

                if (session.pc) {
                    session.pc.close();
                }
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
        } catch (e) {
            console.error(e);
        }
    });

    loadMachines();
</script>
</body>
</html>
