version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: teamdesk-postgres
    environment:
      POSTGRES_DB: teamdesk
      POSTGRES_USER: teamdesk_user
      POSTGRES_PASSWORD: teamdesk_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamdesk_user -d teamdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teamdesk-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teamdesk.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data: